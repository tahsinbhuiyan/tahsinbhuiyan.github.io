<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.msg {
  max-width: 70%;
  padding: 10px;
  margin: 6px;
  border-radius: 12px;
  word-wrap: break-word;
}
.user {
  background: #1e90ff;
  margin-left: auto;
}
.bot {
  background: #262626;
}
#inputBox {
  display: flex;
  padding: 10px;
  background: #111;
}
input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}
button {
  padding: 10px 15px;
  background: #1e90ff;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = prompt("AIzaSyB1Ufi59cA0IDx_csZRSCbs6werLCgWxMM"); // 👈 auto ask

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  document.getElementById("chat").appendChild(msg);
  document.getElementById("chat").scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Typing...", "bot");

  try {
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-goog-api-key": API_KEY
      },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: text }]
        }]
      })
    });

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

    document.querySelector(".bot:last-child").innerText = reply;

  } catch (err) {
    document.querySelector(".bot:last-child").innerText = "Error connecting to AI";
  }
}
</script>

</body>
</html>
