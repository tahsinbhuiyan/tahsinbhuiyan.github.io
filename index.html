<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk AI Hacker Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0a0a0a;
    font-family: 'Orbitron', monospace;
    color: #00ffea;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  h1 {
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
    margin: 20px 0;
  }

  /* Animated cyberpunk lines in background */
  #background {
    position: fixed;
    top:0; left:0; width:100%; height:100%; z-index:-1;
    overflow:hidden;
  }
  .line {
    position:absolute;
    width:2px; height:100%;
    background: linear-gradient(#00ffea, transparent);
    animation: move 5s linear infinite;
    opacity:0.2;
  }
  @keyframes move {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  #terminal {
    width: 95%;
    max-width: 600px;
    height: 70%;
    background-color: #111;
    border-radius: 10px;
    padding: 15px;
    overflow-y: auto;
    box-shadow: 0 0 40px #00ffea;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: neonGlow 2s infinite alternate;
  }

  @keyframes neonGlow {
    0% { box-shadow: 0 0 40px #00ffea; }
    100% { box-shadow: 0 0 60px #ff00ff; }
  }

  .chat {
    padding: 10px;
    border-radius: 5px;
    max-width: 90%;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .user {
    background-color: #ff00ff22;
    align-self: flex-end;
    color: #ff00ff;
    text-shadow: 0 0 5px #ff00ff;
  }

  .ai {
    background-color: #00ffee22;
    align-self: flex-start;
    color: #00ffea;
    text-shadow: 0 0 5px #00ffea;
  }

  #inputBox {
    width: 95%;
    max-width: 600px;
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  #userInput {
    flex: 1;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 5px;
    background-color: #111;
    color: #00ffea;
    box-shadow: 0 0 15px #00ffea;
    outline: none;
  }

  #generateBtn {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 5px;
    background-color: #ff00ff;
    color: #000;
    cursor: pointer;
    box-shadow: 0 0 25px #ff00ff;
    transition: 0.2s all;
  }

  #generateBtn:hover {
    box-shadow: 0 0 50px #ff00ff, 0 0 100px #00ffff;
    transform: scale(1.05);
  }

  /* Terminal scrollbar */
  #terminal::-webkit-scrollbar { width: 8px; }
  #terminal::-webkit-scrollbar-thumb { background: #00ffea44; border-radius: 4px; }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 10px;
    background-color: #00ffea;
    animation: blink 1s steps(2, start) infinite;
    margin-left: 2px;
  }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
</style>
</head>
<body>
<h1>Cyberpunk AI Hacker Terminal</h1>
<div id="background"></div>
<div id="terminal"></div>

<div id="inputBox">
  <input type="text" id="userInput" placeholder="Type your prompt...">
  <button id="generateBtn">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/rodrigopivi/gpt-2-simple-js/gpt2.min.js"></script>
<script>
  // Generate background lines
  for(let i=0;i<50;i++){
    const line=document.createElement('div');
    line.className='line';
    line.style.left=Math.random()*100+'%';
    line.style.animationDuration=(3+Math.random()*5)+'s';
    document.getElementById('background').appendChild(line);
  }

  const gpt = new GPT2();
  const terminal = document.getElementById('terminal');

  gpt.loadModel().then(()=>console.log("GPT-2 loaded"));

  function addMessage(text,sender,typing=false){
    const div=document.createElement('div');
    div.className='chat '+sender;
    terminal.appendChild(div);

    if(!typing){
      div.textContent=text;
      terminal.scrollTop=terminal.scrollHeight;
    } else {
      let i=0;
      const cursor=document.createElement('span');
      cursor.className='cursor';
      div.appendChild(cursor);

      function type(){
        if(i<text.length){
          div.insertBefore(document.createTextNode(text[i]),cursor);
          i++;
          terminal.scrollTop=terminal.scrollHeight;
          setTimeout(type,20);
        } else div.removeChild(cursor);
      }
      type();
    }
  }

  document.getElementById('generateBtn').addEventListener('click',async()=>{
    const inputField=document.getElementById('userInput');
    const input=inputField.value;
    if(!input) return alert("Type something first!");
    addMessage(input,'user');
    inputField.value='';
    addMessage("AI is thinking...","ai");

    try{
      const text=await gpt.generate(input,{length:120});
      const lastAI=terminal.querySelector('.ai:last-child');
      lastAI.textContent='';
      addMessage(text,'ai',true);
    } catch(err){
      const lastAI=terminal.querySelector('.ai:last-child');
      lastAI.textContent="Error generating text: "+err;
    }
  });
</script>
</body>
    </html>
