<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic AI Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin:0; padding:0;
    background: linear-gradient(135deg, #0b0b0b, #1a1a1a);
    font-family:'Orbitron', monospace;
    color:#00ffff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }

  h1 {
    color:#00ffff;
    text-shadow: 0 0 8px #00ffff, 0 0 20px #00aaff;
    margin:20px 0;
    font-weight:700;
  }

  #terminal {
    width:95%;
    max-width:600px;
    height:60%;
    background: rgba(30,30,30,0.85);
    border-radius:15px;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    border: 1px solid #00ffff33;
    box-shadow: 0 0 20px #00ffff44;
  }

  .chat {
    padding:12px;
    border-radius:10px;
    max-width:90%;
    word-wrap:break-word;
    white-space:pre-wrap;
  }

  .user {
    background: rgba(0,255,255,0.1);
    align-self:flex-end;
    color:#00ffff;
  }

  .ai {
    background: rgba(255,255,255,0.1);
    align-self:flex-start;
    color:#ffffff;
  }

  #inputBox {
    width:95%;
    max-width:600px;
    display:flex;
    gap:10px;
    margin-top:15px;
  }

  #userInput {
    flex:1;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background: rgba(50,50,50,0.9);
    color:#00ffff;
    outline:none;
  }

  #generateBtn {
    padding:14px 22px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background: linear-gradient(145deg,#00ffff,#00aaff);
    color:#000;
    cursor:pointer;
    box-shadow: 0 0 15px #00ffff55;
  }

  #generateBtn:hover {
    box-shadow: 0 0 25px #00ffff88;
    transform: scale(1.03);
  }

  .cursor {
    display:inline-block;
    width:10px;
    background:#00ffff;
    animation:blink 1s steps(2,start) infinite;
    margin-left:2px;
  }
  @keyframes blink {0%,50%{opacity:1;}50.01%,100%{opacity:0;}}
</style>
</head>
<body>
<h1>Futuristic AI Terminal</h1>
<div id="terminal"></div>

<div id="inputBox">
  <input type="text" id="userInput" placeholder="Type your prompt...">
  <button id="generateBtn">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/rodrigopivi/gpt-2-simple-js/gpt2.min.js"></script>
<script>
  const terminal=document.getElementById('terminal');
  const gpt=new GPT2();

  gpt.loadModel().then(()=>console.log("GPT-2 loaded")).catch(()=>alert("GPT-2 failed to load"));

  function addMessage(text,sender,typing=false){
    const div=document.createElement('div');
    div.className='chat '+sender;
    terminal.appendChild(div);

    if(!typing){
      div.textContent=text;
      terminal.scrollTop=terminal.scrollHeight;
    } else {
      let i=0;
      const cursor=document.createElement('span');
      cursor.className='cursor';
      div.appendChild(cursor);
      function type(){
        if(i<text.length){
          div.insertBefore(document.createTextNode(text[i]),cursor);
          i++;
          terminal.scrollTop=terminal.scrollHeight;
          setTimeout(type,20);
        } else div.removeChild(cursor);
      }
      type();
    }
  }

  document.getElementById('generateBtn').addEventListener('click',async()=>{
    const inputField=document.getElementById('userInput');
    const input=inputField.value;
    if(!input) return alert("Type something first!");

    addMessage(input,'user');
    inputField.value='';
    addMessage("AI is thinking...","ai");

    try{
      const text=await gpt.generate(input,{length:100});
      const lastAI=terminal.querySelector('.ai:last-child');
      lastAI.textContent='';
      addMessage(text,'ai',true);
    } catch(err){
      const lastAI=terminal.querySelector('.ai:last-child');
      lastAI.textContent="Error generating text: "+err;
    }
  });
</script>
</body>
</html>
